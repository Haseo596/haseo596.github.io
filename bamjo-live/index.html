<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Матч</title>
  <link rel="stylesheet" href="./styles.css?v=0.5.28">
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="Матч">
      <div class="brand">
        <div class="mark">B</div>
        <div>
          <p id="matchStatus">Не подключено</p>
        </div>
      </div>

      <div class="connection" aria-label="Подключение">
        <label>
          <span>Матч</span>
          <input id="matchIdInput" autocomplete="off" spellcheck="false">
        </label>
        <button id="connectButton" type="button">Подключить</button>
      </div>

      <div class="scoreboard" aria-live="polite">
        <div class="team red">
          <span>Красные</span>
          <strong id="redScore">0</strong>
        </div>
        <div class="clock">
          <span id="tickLabel">0:00 / 0:00</span>
          <div class="progress"><i id="progressBar"></i></div>
        </div>
        <div class="team blue">
          <strong id="blueScore">0</strong>
          <span>Синие</span>
        </div>
      </div>
    </section>

    <section class="layout">
      <section class="pitchPanel" aria-label="Поле">
        <div class="pitchHeader">
          <div>
            <span id="phaseLabel">Ожидание</span>
            <strong id="matchIdLabel">-</strong>
          </div>
          <div id="serverTimeLabel">-</div>
        </div>
        <div class="pitchViewport">
          <div id="pitch" class="pitch">
            <div class="goalInterior redGoalInterior"></div>
            <div class="goalInterior blueGoalInterior"></div>
            <div class="goal redGoal"></div>
            <div class="goal blueGoal"></div>
            <div class="centerLine"></div>
            <div class="centerCircle"></div>
            <div id="objectsLayer" class="layer"></div>
            <div id="ballShadow" class="ballShadow" aria-hidden="true"></div>
            <div id="playersLayer" class="layer"></div>
            <div id="effectsLayer" class="layer effectsLayer"></div>
            <div id="ball" class="ball" aria-label="Мяч"></div>
            <div id="goalOverlay" class="goalOverlay" hidden>
              <strong>Гол!</strong>
              <span id="goalScorer"></span>
            </div>
            <div id="matchEndOverlay" class="matchEndOverlay" hidden>
              <strong>Матч окончен!</strong>
              <span id="matchEndScore">0:0</span>
            </div>
          </div>
        </div>
      </section>

      <aside class="sidePanel" aria-label="События">
        <section class="panelSection">
          <h2>Составы</h2>
          <div class="rosters">
            <div>
              <h3>Красные</h3>
              <div id="redRoster" class="roster"></div>
            </div>
            <div>
              <h3>Синие</h3>
              <div id="blueRoster" class="roster"></div>
            </div>
          </div>
        </section>
        <section class="panelSection eventsSection">
          <h2>События</h2>
          <div id="events" class="events"></div>
        </section>
      </aside>
    </section>
  </main>
  <div class="viewerVersion" aria-label="Версия клиента">live v0.5.28</div>

  <script type="module" src="./js/main.js?v=0.5.28"></script>
</body>
</html>
